name: Multiple greets

on:
    workflow_dispatch:
        
jobs:
    say-hello-inline-bash:
        runs-on: ubuntu-24.04
        steps:
            - run: echo "Hello world!"              

    say-hello-inline-python:
        runs-on: ubuntu-24.04
        needs: 
            - say-hello-inline-bash
        steps:
            - run: print("Hello world!")
              shell: python

    say-hello-action:
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/hello-world-javascript-action@v1
              with:
                  who-to-greet: "World"