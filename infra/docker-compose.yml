version: "3.9"

services:
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  db:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  s3:
    image: localstack/localstack:latest
    restart: unless-stopped
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_REGION=us-east-1
    volumes:
      - localstack_data:/var/lib/localstack

  api:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ..:/app
    command: sh -c "npm install && npm run dev:api"
    ports:
      - "6500:6500"
    depends_on:
      - redis
      - db
      - s3
    environment:
      - PORT=6500
      - REDIS_URL=redis://redis:6379
      - MONGO_URL=mongodb://db:27017/job-service
      - S3_ENDPOINT=http://s3:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test

  worker:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ..:/app
    command: sh -c "npm install && npm run dev:worker"
    depends_on:
      - redis
      - db
      - s3
    environment:
      - REDIS_URL=redis://redis:6379
      - MONGO_URL=mongodb://db:27017/job-service
      - S3_ENDPOINT=http://s3:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test

volumes:
  redis_data:
  mongo_data:
  localstack_data: